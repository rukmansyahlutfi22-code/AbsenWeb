<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absen - ZZ Absensi</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f9; padding: 10px; }
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        video { width: 100%; border-radius: 10px; background: #000; }
        .btn-absen { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h4>Profil Perangkat Desa</h4>
        <p>Nama: Rukmansyah (Sekdes)</p>
    </div>
    <div class="card">
        <video id="kamera" autoplay playsinline></video>
        <p id="infoLokasi">Mencari lokasi...</p>
        <button class="btn-absen" onclick="kirim()">KONFIRMASI ABSENSI</button>
    </div>
    <a href="riwayat.html">Lihat Riwayat</a>

    <script>
        async function start() { const stream = await navigator.mediaDevices.getUserMedia({ video: true }); document.getElementById('kamera').srcObject = stream; }
        navigator.geolocation.getCurrentPosition(p => document.getElementById('infoLokasi').innerText = "Lokasi: " + p.coords.latitude + ", " + p.coords.longitude);
        function kirim() {
            // Masukkan link Google Apps Script Bapak di sini
            const url = "URL_GOOGLE_APPS_SCRIPT_BAPAK";
            alert("Absensi dikirim ke server!");
        }
        start();
    </script>
</body>
</html>
