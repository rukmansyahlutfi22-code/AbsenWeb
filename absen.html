<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absen Digital</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-top: 10px; font-size: 16px; }
        video { width: 100%; border-radius: 15px; background: #000; }
        .btn-modern { width: 100%; padding: 16px; background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; border: none; border-radius: 12px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Pilih Nama Anda</h3>
        <select id="namaPerangkat">
            <option>Rukmansyah - Sekdes</option>
            <option>Nama Perangkat 2</option>
            <option>Nama Perangkat 3</option>
        </select>
    </div>

    <div class="card">
        <video id="kamera" autoplay playsinline></video>
        <p id="info">Lokasi: Mencari GPS...</p>
        <button class="btn-modern" onclick="kirim()">KONFIRMASI ABSENSI</button>
    </div>

    <script>
        async function start() { const s = await navigator.mediaDevices.getUserMedia({video:true}); document.getElementById('kamera').srcObject = s; }
        navigator.geolocation.getCurrentPosition(p => document.getElementById('info').innerText = "Lokasi: " + p.coords.latitude + ", " + p.coords.longitude);

        function kirim() {
            // GANTI URL DI BAWAH INI DENGAN LINK WEB APP BAPAK
            const url = "ISI_URL_WEB_APP_BAPAK_DI_SINI"; 
            
            const data = { 
                nama: document.getElementById('namaPerangkat').value, 
                lokasi: document.getElementById('info').innerText 
            };

            fetch(url, { method: "POST", mode: "no-cors", body: JSON.stringify(data) })
            .then(() => alert("Absensi Berhasil!"));
        }
        start();
    </script>
</body>
</html>
