<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZZ ABSENSI DIGITAL</title>
    <style>
        body { font-family: sans-serif; background: #eef2f5; margin: 0; padding-bottom: 60px; }
        .screen { display: none; padding: 15px; }
        .active { display: block; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        video { width: 100%; border-radius: 10px; background: #000; }
        .btn { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 10px; font-weight: bold; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: white; border-top: 1px solid #ddd; }
        .nav button { flex: 1; padding: 15px; border: none; background: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="home" class="screen active">
        <div class="card"><h3>Profil: Rukmansyah</h3></div>
        <div class="card">
            <video id="kamera" autoplay playsinline></video>
            <p id="info">Mencari lokasi...</p>
            <button class="btn" onclick="kirim()">KONFIRMASI ABSENSI</button>
        </div>
    </div>

    <div id="riwayat" class="screen">
        <h3>Riwayat Absensi</h3>
        <div class="card" id="listRiwayat">Data Riwayat...</div>
    </div>

    <div class="nav">
        <button onclick="show('home')">Home</button>
        <button onclick="show('riwayat')">Riwayat</button>
    </div>

    <script>
        function show(id) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }
        async function start() { const s = await navigator.mediaDevices.getUserMedia({video:true}); document.getElementById('kamera').srcObject = s; }
        navigator.geolocation.getCurrentPosition(p => document.getElementById('info').innerText = "Lokasi: " + p.coords.latitude + ", " + p.coords.longitude);
        function kirim() { alert("Data dikirim ke Google Sheets!"); }
        start();
    </script>
</body>
</html>
